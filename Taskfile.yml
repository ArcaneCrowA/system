# yaml-language-server: $schema=https://taskfile.dev/schema.json

version: "3"

includes:
  go: languages/go.yml
  rust: languages/rust.yml
  python: languages/python.yml

tasks:
  default:
    desc: List available tasks
    cmds:
      - task --list
    silent: true

  link:
    desc: Symlink all dotfiles into $HOME
    cmds:
      - sh scripts/link.sh

  # ── Bootstrap ───────────────────────────────────────────────────────

  bootstrap:
    desc: Bootstrap the machine
    deps:
      - macos:bootstrap
      - nixos:link
    cmds:
      - sh scripts/link.sh

  # ── macOS ──────────────────────────────────────────────────────────

  macos:bootstrap:
    desc: Install Homebrew and run Brewfile
    cmds:
      - sh scripts/bootstrap-macos.sh
    platforms: [darwin]

  macos:defaults:
    desc: Apply macOS system defaults
    cmds:
      - sh macos/defaults.sh
    platforms: [darwin]

  # ── NixOS ───────────────────────────────────────────────────────────

  nixos:link:
    desc: Symlink NixOS config into /etc/nixos (requires sudo)
    cmds:
      - sudo mkdir -p /etc/nixos
      - sudo stow --no-folding -t /etc/nixos -d . nixos
    platforms: [linux]

  # ── Update ─────────────────────────────────────────────────────────

  update:
    desc: Update all installed tooling
    deps: [go:install, rust:install, python:install]
