# yaml-language-server: $schema=https://taskfile.dev/schema.json

version: "3"

tasks:
  install:
    desc: Install Rust tooling
    platforms: [darwin, linux]
    cmds:
      - for:
          - cargo-edit
          - cargo-watch
          - cargo-nextest
          - cargo-tarpaulin
          - cargo-audit
        cmd: cargo install {{.ITEM}}
