# yaml-language-server: $schema=https://taskfile.dev/schema.json

version: "3"

tasks:
  install:
    desc: Install Python development tooling via uv
    platforms: [darwin, linux]
    cmds:
      - for:
          - pyrefly
          - ruff
        cmd: uv tool install {{.ITEM}}

  update:
    desc: Updte Python development tooling via uv
    platforms: [darwin, linux]
    cmd: uv tool upgrade --all
